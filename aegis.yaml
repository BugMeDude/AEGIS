# AEGIS config — authorised sandbox lab (tracked; repo is PRIVATE).
# lab_mode runs AEGIS at full capability with no caps and no auth prompt.
# Contains no secrets. Keep this repository private.
ollama:
  model: "gemma4:31b-cloud"
  fallback_model: "gemma4:latest"
  enabled: true

safety:
  lab_mode: true        # no auth prompt, no caps, full offensive capability
  authorized: true
  allowlist: []
  blocklist: []

report_dir: "aegis_reports"
default_timeout: 15.0
